name: CI/CD — Portfolio

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate assets
        run: |
          if [ ! -f index.html ]; then
            echo "index.html not found!"
            exit 1
          fi
          if [ ! -f styles.css ]; then
            echo "styles.css not found!"
            exit 1
          fi
          if [ ! -f main.js ]; then
            echo "main.js not found!"
            exit 1
          fi
          echo "index.html found"
          echo "styles.css found"
          echo "main.js found"

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/portfolio:${{ github.sha }} .

      - name: Test container starts correctly
        run: |
          docker run -d --name portfolio-test -p 8080:80 \
            ${{ secrets.DOCKERHUB_USERNAME }}/portfolio:${{ github.sha }}
          sleep 3
          curl -f http://localhost:8080 && echo "Container responds"
          docker stop portfolio-test && docker rm portfolio-test

      - name: Login to Docker Hub
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/portfolio
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Push to Docker Hub
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - id: deployment
        uses: actions/deploy-pages@v4

  tag-release:
    name: Create Git Tag
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push tag
        run: |
          VERSION="v1.0.$(date +'%Y%m%d%H%M%S')"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$VERSION" -m "Auto-release $VERSION"
          git push origin "$VERSION"
          echo "Tagged as $VERSION"